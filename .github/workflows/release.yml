name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 0.2.2)"
        required: true
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install just
        run: brew install just

      - name: Run Tests
        run: just test

      - name: Build and create DMG
        run: just dmg

      - name: Resolve DMG path
        id: artifact
        run: |
          dmg_file=$(ls -t build/copilot-island-*.dmg | head -n 1)
          if [ -z "$dmg_file" ]; then
            echo "No DMG file found in build/."
            exit 1
          fi
          echo "dmg_file=$dmg_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.dmg_file }}
