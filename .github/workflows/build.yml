name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install just
        run: brew install just

      - name: Run Tests
        run: just test

      - name: Build and create DMG
        run: just dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-island
          path: build/copilot-island-*.dmg
